# -----------------------------------------------------------------------
# NEXUSSS VPS-SSH MODE - FULL STACK EDITION 🚀
# Level: VIP + Tingkat Dewa + Dev Ready (PY & JS)
# -----------------------------------------------------------------------

name: ⚡ NEXUSSS DEWA VPS (PY/JS)

on:
  workflow_dispatch: # Jalankan manual dari tab Actions

jobs:
  nexus-vps:
    name: 🖥️ Establishing High-End Environment
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python (Dewa Edition)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Versi stabil & kenceng

      - name: 🟢 Setup Node.js (VIP Speed)
        uses: actions/setup-node@v4
        with:
          node-version: '24' # LTS Version untuk performa maksimal

      - name: 🛠️ Pre-install Essential Tools
        run: |
          echo "📦 Menyiapkan alat tempur..."
          sudo apt-get update
          sudo apt-get install -y curl git wget build-essential
          echo "✅ Python Version: $(python --version)"
          echo "✅ Node.js Version: $(node -v)"
          echo "✅ NPM Version: $(npm -v)"

      - name: 🚀 Launching SSH Tunnel (Tmate)
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 360 # Max limit 6 jam (Aturan GitHub)
        with:
          limit-access-to-actor: false # Bisa diakses siapa saja yang punya link

      - name: 🏆 Final Status
        run: |
          echo "========================================="
          echo "✨ NEXUSSS FULL STACK VPS IS READY! ✨"
          echo "Status: Python & JS Terinstal Sempurna."
          echo "Cek link SSH/Web Shell di atas!"
          echo "========================================="
            echo "✨ Melewati tahap testing (Non-Node Project)"
          fi

      - name: 🚀 Deployment Ready
        if: success()
        run: |
          echo "========================================="
          echo "✨ WORKFLOW SUCCESS BY NEXUSSS ✨"
          echo "Status: VIP LEVEL ACHIEVED 🏆"
          echo "========================================="
