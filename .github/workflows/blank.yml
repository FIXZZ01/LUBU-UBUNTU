# 🌌 NEXUSSS OMNI-FLOW: GOD MODE EDITION 🌌
# Status: VIP UNLOCKED | Performance: MAX | Security: HARDENED

name: "Nexusss Ultimate Pipeline"

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  nexus-core:
    name: "🛠️ Elite Build & Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: "🛰️ Fetching Source Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "💎 Universal Node.js Setup"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Cache otomatis hanya aktif jika lock file terdeteksi (Anti-Error System)
          cache: ${{ hashFiles('package-lock.json', 'yarn.lock') != '' && 'npm' || '' }}

      - name: "🛡️ Smart Dependency Management"
        run: |
          if [ -f package-lock.json ]; then
            echo "✅ Lockfile found. Executing Clean Install..."
            npm ci
          elif [ -f yarn.lock ]; then
            echo "✅ Yarn detected. Executing Yarn Install..."
            yarn install --frozen-lockfile
          else
            echo "⚠️ No lockfile detected. Executing Standard Install..."
            npm install
          fi

      - name: "🕵️ Deep Security Scan (Bug Hunter Mode)"
        run: |
          echo "Scanning for vulnerabilities..."
          npm audit --audit-level=high || echo "Proceeding with caution..."

      - name: "🚀 Optimized Build Process"
        run: |
          if npm run | grep -q "build"; then
            echo "Starting Production Build..."
            npm run build
          else
            echo "No build script found. Skipping to finalization..."
          fi

      - name: "✨ God-Tier Finalization"
        run: |
          echo "Process Completed by Nexusss."
          echo "System Status: 100% OPERATIONAL"
